name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PNPM_VERSION: 11

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: ${{ env.PNPM_VERSION }} }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: ${{ env.PNPM_VERSION }} }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # Filter out TUI (pre-existing JSX errors) and Non-TS packages
      - run: pnpm typecheck:downstream

  test:
    name: Test (${{ matrix.os }} / Node ${{ matrix.node }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22, 23]
    runs-on: ${{ matrix.os }}
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: ${{ env.PNPM_VERSION }} }
      - uses: actions/setup-node@v4
        with: { node-version: ${{ matrix.node }}, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:ts
      # Core zero-dependency check
      - run: node -e "const d=require('./packages/core/package.json').dependencies||{};if(Object.keys(d).length)process.exit(1)"
      # Core build size check (du fallback, no size-limit tool configured)
      - run: du -b packages/core/dist/index.cjs packages/core/dist/index.js 2>/dev/null || true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: ${{ env.PNPM_VERSION }} }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Chassis classification: verify Pure TS Library packages produce ESM+CJS
      - run: |
          for pkg in core engine tools skills; do
            [ -f "packages/$pkg/dist/index.js" ] || { echo "Missing ESM: packages/$pkg/dist/index.js"; exit 1; }
            [ -f "packages/$pkg/dist/index.cjs" ] || { echo "Missing CJS: packages/$pkg/dist/index.cjs"; exit 1; }
          done
        name: Chassis check (Pure TS Library ESM+CJS)
      # Core size-limit check
      - run: |
          ESM=$(du -b packages/core/dist/index.js | cut -f1)
          CJS=$(du -b packages/core/dist/index.cjs | cut -f1)
          echo "ESM=${ESM}B CJS=${CJS}B"
          [ "$ESM" -le 51200 ] || { echo "ESM $ESM > 50KB"; exit 1; }
          [ "$CJS" -le 51200 ] || { echo "CJS $CJS > 50KB"; exit 1; }
        name: Core size-limit (≤50KB)
      # ts-prune quality gate (W1: warning level, continue-on-error)
      - run: npx ts-prune -p packages/core/tsconfig.json
        continue-on-error: true
        name: ts-prune unused exports (W1 warning)
      # Audit quality gate (W1: warning level)
      - run: pnpm audit --audit-level=high || true
        name: pnpm audit (high/critical → warning)

  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: ${{ env.PNPM_VERSION }} }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # E2E acceptance tests
      - run: pnpm test:e2e
      # JSON-RPC roundtrip smoke test via core protocol
      - run: node -e "
          const {encode,decode,isResponse} = require('@zaivim/core');
          const encoded = encode({jsonrpc:'2.0',id:1,method:'health',params:{}});
          const decoded = decode(encoded);
          console.assert(isResponse(decoded), 'Expected response');
          console.log('SMOKE OK:', encoded);
        "
        name: JSON-RPC health roundtrip
