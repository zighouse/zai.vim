- name: deepseek                        # AI助理标识/服务商 (自定义)
  base-url: https://api.deepseek.com    # api 调用地址
  api-key-name: DEEPSEEK_API_KEY        # api 调用口令环境变量名
  tokenizer: deepseek-ai/DeepSeek-V3.2  # 统一的分词器 (可选，用于限制请求长度)
  model:                                # 服务商提供的模型清单
  - name: deepseek-chat                       # 模型标识 (要与服务商的清单一致)
    size: 685.40B                             # 模型尺寸 (暂时仅用作展示)
    context: 128K                             # 上下文长度 (用于限制请求长度)
    output: { default: 4K, max: 8K }          # 输出长度 (默认, 最大)
    cost: { hit: 0.2, in: 2, out: 3 }   # 价格：缓冲命中、输入、输出、单位(人民币每百万词)
    features: json, tools, complete      # 支持特性
  - name: deepseek-reasoner
    size: 685.40B
    context: 128K
    output: { default: 32K, max: 64K }
    cost: { hit: 0.2, in: 2, out: 3 }
    features: json, tools, complete

