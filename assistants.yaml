- name: 火山方舟
  api-key-name: VOLCES_API_KEY
  base-url: https://ark.cn-beijing.volces.com/api/v3
  # completion: https://ark.cn-beijing.volces.com/api/v3/chat/completions
  # tokenization: https://ark.cn-beijing.volces.com/api/v3/tokenization
  model:
  - name: doubao-seed-1-8-251228
    context: 256K
    output: 64K
    cost:  {hit: 0.16, in: 0.8, out: 2, level: ["in<=32K", "out<=200K"]}
    cost2: {hit: 0.16, in: 0.8, out: 4, level: ["in<=32K", "out>200K"]}
    cost3: {hit: 0.16, in: 1.2, out: 8, level: ["32K<=in<=128K"]}
    cost4: {hit: 0.16, in: 2.4, out: 12, level: ["in>128K"]}
    features: vision, tools
    # 支持思考程度可调节（reasoning effort）：分为 minimal、low、medium、high 四种模式，其中minimal为不思考
    params: { reasoning_effort: "high" }
  - name: doubao-seed-1-6-251015 # 分段计费 2/M 上下文256k 输出32k
  - deepseek-v3-1-250821
  - doubao-seedance-1-0-pro-250528 # {"name": "doubao-seedance-1-0-pro-250528", "comment": "图像生成、视频生成"},
  - doubao-seed-1-6-vision-250815
  - doubao-seed-1-6-thinking-250715
  - doubao-seed-1-6-flash-250828
  - doubao-1-5-thinking-pro-250415
  - doubao-1.5-vision-pro-250328
  - doubao-1-5-ui-tars-250428
  - deepseek-r1-250528
  - deepseek-v3-250324
  - doubao-1-5-pro-32k-250115
  - doubao-1-5-pro-256k-250115
  - doubao-1-5-lite-32k-250115
  - kimi-k2-250905

