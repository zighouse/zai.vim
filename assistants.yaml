- name: aliyun
  api-key-name: ALIYUN_API_KEY
  base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
  tokenizer: Qwen/Qwen3-8B
  model:
  - name: qwen3-max
    context: 256K
    input: 252K
    output: 64K
    cost: { hit: 0.64, in: 3.2, out: 12.8 }
    features: tools, search
    params: { extra_body: { enable_search: true } }
  - name: qwen-plus
    context: 1M
    input: 997K
    output: 32K
    cost: { in: 0.8, out: 2, out_think: 8, hit: 0.16 }
    features: tools, search
    params: { extra_body: { enable_search: true } }
  - name: qwen-max
    context: 32K
    input: 30K
    output: 8K
    cost: {in: 2.4, out: 9.6, hit: 0.48 }
    features: tools, search
    params: { extra_body: { enable_search: true } }
  - name: qwen3-coder-plus
    context: 1M
    input: 1M
    output: 64K
    cost: { in: 4, out: 16, hit: 0.8 }
    features: tools
  - name: qwen3-flash
    context: 1M
    input: 997K
    output: 32K
    cost: { in: 0.15, out: 1.5, hit: 0.03 }
    features: tools, search
    params: { extra_body: { enable_search: true } }
  - name: qwen3-coder-flash
    features: tools
    context: 1M
    input: 997K
    output: 64K
    cost: { in: 1, out: 4, hit: 0.2 }
